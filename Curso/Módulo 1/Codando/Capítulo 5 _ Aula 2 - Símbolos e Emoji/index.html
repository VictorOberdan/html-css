<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Símbolos e Emoji</title>
</head>
<body>
    <h1>Símbolos e Emoji</h1>
    <hr>
    <p>Você pode escrever
        um parágrafo de 
        qualquer jeito.
        Basta colocar tudo
        no meio do par de tags
        &lt;p&gt; e &lt;/p&gt;. <!-- LESS THAN / GREATER THAN -->
    </p>
    <p>Se precisar quebrar
        o texto em algum lugar
        específico <br>como esse,
        você pode usar a tag &lt;br&gt;.
    </p>
    <p>
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &delta;
        &Delta;
        &uparrow;
        &ddagger;
    </p>
    <p>
        Vamos adicionar alguns emoji:
        &#x1F47D;
        &#x1F385;
        &#x1F480;
    </p>
</body>
</html>
